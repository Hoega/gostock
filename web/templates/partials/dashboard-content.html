{{define "dashboard-content.html"}}
<!-- Filter Tabs -->
<div class="border-b border-gray-200">
    <nav class="-mb-px flex space-x-8">
        <a href="#"
           hx-get="/dashboard?filter=all&sort={{.SortBy}}&desc={{if .SortDesc}}true{{else}}false{{end}}"
           hx-target="#dashboard-content"
           class="{{if eq .Filter "all"}}border-indigo-500 text-indigo-600{{else}}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300{{end}} whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
            Tous
            <span class="ml-2 py-0.5 px-2.5 rounded-full text-xs font-medium {{if eq .Filter "all"}}bg-indigo-100 text-indigo-600{{else}}bg-gray-100 text-gray-900{{end}}">
                {{add .StockCount .CryptoCount}}
            </span>
        </a>
        <a href="#"
           hx-get="/dashboard?filter=stocks&sort={{.SortBy}}&desc={{if .SortDesc}}true{{else}}false{{end}}"
           hx-target="#dashboard-content"
           class="{{if eq .Filter "stocks"}}border-indigo-500 text-indigo-600{{else}}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300{{end}} whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
            Actions
            <span class="ml-2 py-0.5 px-2.5 rounded-full text-xs font-medium {{if eq .Filter "stocks"}}bg-indigo-100 text-indigo-600{{else}}bg-gray-100 text-gray-900{{end}}">
                {{.StockCount}}
            </span>
        </a>
        <a href="#"
           hx-get="/dashboard?filter=crypto&sort={{.SortBy}}&desc={{if .SortDesc}}true{{else}}false{{end}}"
           hx-target="#dashboard-content"
           class="{{if eq .Filter "crypto"}}border-indigo-500 text-indigo-600{{else}}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300{{end}} whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
            Crypto
            <span class="ml-2 py-0.5 px-2.5 rounded-full text-xs font-medium {{if eq .Filter "crypto"}}bg-indigo-100 text-indigo-600{{else}}bg-gray-100 text-gray-900{{end}}">
                {{.CryptoCount}}
            </span>
        </a>
    </nav>
</div>

{{template "dashboard-table.html" .}}
{{end}}
