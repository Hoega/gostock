{{define "portfolio-charts.html"}}
{{if gt (len .Positions) 0}}
<div class="bg-white shadow rounded-lg p-6 mt-6">
    <h2 class="text-xl font-bold text-gray-900 mb-4">R&eacute;partition</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- Allocation by broker -->
        <div>
            <h3 class="text-sm font-semibold text-gray-600 text-center mb-2">Par courtier</h3>
            <canvas id="brokerChart" height="250"></canvas>
        </div>

        <!-- Allocation by stock -->
        <div>
            <h3 class="text-sm font-semibold text-gray-600 text-center mb-2">Par position</h3>
            <canvas id="stockChart" height="250"></canvas>
        </div>

        <!-- Allocation by sector -->
        <div>
            <h3 class="text-sm font-semibold text-gray-600 text-center mb-2">Par secteur</h3>
            <canvas id="sectorChart" height="250"></canvas>
        </div>

        <!-- Allocation by currency -->
        <div>
            <h3 class="text-sm font-semibold text-gray-600 text-center mb-2">Par devise</h3>
            <canvas id="currencyChart" height="250"></canvas>
        </div>
    </div>

    <!-- Gain/loss per position — full width -->
    <div class="mt-6">
        <h3 class="text-sm font-semibold text-gray-600 text-center mb-2">Plus/moins-value</h3>
        <canvas id="gainChart" height="80"></canvas>
    </div>
</div>

<!-- Total portfolio value history -->
<div class="bg-white shadow rounded-lg p-6 mt-6">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-gray-900">Evolution de la valeur</h2>
        <div class="flex gap-1" id="stock-total-range-btns">
            <button onclick="loadStockTotalHistory('1m')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-300 transition-colors">1M</button>
            <button onclick="loadStockTotalHistory('3m')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-300 transition-colors">3M</button>
            <button onclick="loadStockTotalHistory('1y')" class="px-3 py-1 text-xs font-medium rounded-full bg-indigo-100 text-indigo-700 border border-indigo-300 transition-colors">1A</button>
            <button onclick="loadStockTotalHistory('5y')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-300 transition-colors">5A</button>
            <button onclick="loadStockTotalHistory('max')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-300 transition-colors">Max</button>
        </div>
    </div>
    <div id="stock-total-loading" class="flex items-center justify-center py-8 text-gray-400">
        <svg class="animate-spin h-5 w-5 mr-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        Chargement...
    </div>
    <canvas id="stockTotalChart" height="100" style="display:none;"></canvas>
</div>

<!-- EUR/USD exchange rate history -->
<div class="bg-white shadow rounded-lg p-6 mt-6">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-gray-900">Taux de change EUR/USD</h2>
        <div class="flex gap-1" id="eurusd-range-btns">
            <button onclick="loadEURUSDHistory('1m')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-300 transition-colors">1M</button>
            <button onclick="loadEURUSDHistory('3m')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-300 transition-colors">3M</button>
            <button onclick="loadEURUSDHistory('1y')" class="px-3 py-1 text-xs font-medium rounded-full bg-indigo-100 text-indigo-700 border border-indigo-300 transition-colors">1A</button>
            <button onclick="loadEURUSDHistory('5y')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-300 transition-colors">5A</button>
            <button onclick="loadEURUSDHistory('max')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-300 transition-colors">Max</button>
        </div>
    </div>
    <div id="eurusd-loading" class="flex items-center justify-center py-8 text-gray-400">
        <svg class="animate-spin h-5 w-5 mr-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        Chargement...
    </div>
    <canvas id="eurusdChart" height="100" style="display:none;"></canvas>
</div>

<!-- Per-asset history chart -->
<div id="stock-asset-history" class="bg-white shadow rounded-lg p-6 mt-6" style="display:none;">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-gray-900" id="stock-asset-title">Historique</h2>
        <div class="flex items-center gap-2">
            <div class="flex gap-1" id="stock-asset-range-btns">
                <button onclick="loadStockAssetHistory('1m')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-300 transition-colors">1M</button>
                <button onclick="loadStockAssetHistory('3m')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-300 transition-colors">3M</button>
                <button onclick="loadStockAssetHistory('1y')" class="px-3 py-1 text-xs font-medium rounded-full bg-indigo-100 text-indigo-700 border border-indigo-300 transition-colors">1A</button>
                <button onclick="loadStockAssetHistory('5y')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-300 transition-colors">5A</button>
                <button onclick="loadStockAssetHistory('max')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-300 transition-colors">Max</button>
            </div>
            <button onclick="document.getElementById('stock-asset-history').style.display='none'" class="text-gray-400 hover:text-gray-600 text-lg leading-none">&times;</button>
        </div>
    </div>
    <div id="stock-asset-loading" class="flex items-center justify-center py-8 text-gray-400" style="display:none;">
        <svg class="animate-spin h-5 w-5 mr-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        Chargement...
    </div>
    <canvas id="stockAssetChart" height="100"></canvas>
</div>

<script>
(function() {
    // Destroy existing charts if they exist
    ['brokerChart', 'stockChart', 'sectorChart', 'currencyChart', 'gainChart'].forEach(function(id) {
        var existing = Chart.getChart(id);
        if (existing) existing.destroy();
    });

    var brokerLabels = {{toJSON .BrokerLabels}};
    var brokerValues = {{toJSON .BrokerValues}};
    var brokerStocks = {{toJSON .BrokerStocks}};
    var stockLabels = {{toJSON .StockLabels}};
    var stockValues = {{toJSON .StockValues}};
    var gainLabels = {{toJSON .GainLabels}};
    var gainValues = {{toJSON .GainValues}};
    var gainColors = {{toJSON .GainColors}};
    var sectorLabels = {{toJSON .SectorLabels}};
    var sectorValues = {{toJSON .SectorValues}};
    var sectorStocks = {{toJSON .SectorStocks}};
    var currencyLabels = {{toJSON .CurrencyLabels}};
    var currencyValues = {{toJSON .CurrencyValues}};
    var currencyStocks = {{toJSON .CurrencyStocks}};

    function stocksTooltip(stocksArr) {
        return {
            callbacks: {
                afterLabel: function(context) {
                    var stocks = stocksArr && stocksArr[context.dataIndex];
                    if (!stocks || !stocks.length) return '';
                    return stocks.map(function(s) { return '• ' + s; });
                }
            }
        };
    }

    var pieColors = [
        'rgba(99, 102, 241, 0.7)',
        'rgba(249, 115, 22, 0.7)',
        'rgba(34, 197, 94, 0.7)',
        'rgba(239, 68, 68, 0.7)',
        'rgba(168, 85, 247, 0.7)',
        'rgba(14, 165, 233, 0.7)',
        'rgba(234, 179, 8, 0.7)',
        'rgba(236, 72, 153, 0.7)'
    ];

    new Chart(document.getElementById('brokerChart'), {
        type: 'pie',
        data: {
            labels: brokerLabels,
            datasets: [{
                data: brokerValues,
                backgroundColor: ['rgba(249, 115, 22, 0.7)', 'rgba(59, 130, 246, 0.7)']
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' },
                tooltip: stocksTooltip(brokerStocks)
            }
        }
    });

    new Chart(document.getElementById('stockChart'), {
        type: 'pie',
        data: {
            labels: stockLabels,
            datasets: [{
                data: stockValues,
                backgroundColor: pieColors.slice(0, stockLabels.length)
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });

    new Chart(document.getElementById('sectorChart'), {
        type: 'pie',
        data: {
            labels: sectorLabels,
            datasets: [{
                data: sectorValues,
                backgroundColor: pieColors.slice(0, sectorLabels.length)
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' },
                tooltip: stocksTooltip(sectorStocks)
            }
        }
    });

    new Chart(document.getElementById('currencyChart'), {
        type: 'pie',
        data: {
            labels: currencyLabels,
            datasets: [{
                data: currencyValues,
                backgroundColor: pieColors.slice(0, currencyLabels.length)
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' },
                tooltip: stocksTooltip(currencyStocks)
            }
        }
    });

    new Chart(document.getElementById('gainChart'), {
        type: 'bar',
        data: {
            labels: gainLabels,
            datasets: [{
                label: 'Plus/moins-value (\u20ac)',
                data: gainValues,
                backgroundColor: gainColors
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(value) { return value.toLocaleString('fr-FR') + ' \u20ac'; }
                    }
                }
            }
        }
    });

    // --- History chart helpers ---
    function mapPoints(data) {
        if (!Array.isArray(data)) return [];
        return data.filter(function(pt) { return pt && pt.t != null && pt.p != null; })
                   .map(function(pt) { return {x: pt.t, y: pt.p}; });
    }

    var historyLineOpts = {
        responsive: true,
        interaction: { mode: 'nearest', axis: 'x', intersect: false },
        plugins: {
            legend: { display: false },
            tooltip: {
                callbacks: {
                    title: function(items) {
                        if (!items.length) return '';
                        return new Date(items[0].parsed.x).toLocaleDateString('fr-FR', {day:'numeric', month:'short', year:'numeric'});
                    },
                    label: function(item) {
                        return item.parsed.y.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' \u20ac';
                    }
                }
            }
        },
        scales: {
            x: {
                type: 'time',
                time: { tooltipFormat: 'dd MMM yyyy' },
                ticks: { maxTicksLimit: 8 }
            },
            y: {
                ticks: {
                    callback: function(value) { return value.toLocaleString('fr-FR') + ' \u20ac'; }
                }
            }
        }
    };

    function setActiveBtn(containerId, activeIdx) {
        var btns = document.getElementById(containerId).querySelectorAll('button');
        btns.forEach(function(btn, i) {
            if (i === activeIdx) {
                btn.className = 'px-3 py-1 text-xs font-medium rounded-full bg-indigo-100 text-indigo-700 border border-indigo-300 transition-colors';
            } else {
                btn.className = 'px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-300 transition-colors';
            }
        });
    }

    var rangeIndex = {'1m':0, '3m':1, '1y':2, '5y':3, 'max':4};

    // --- Total stock portfolio history ---
    window.loadStockTotalHistory = function(range) {
        setActiveBtn('stock-total-range-btns', rangeIndex[range]);
        var loading = document.getElementById('stock-total-loading');
        var canvas = document.getElementById('stockTotalChart');
        loading.style.display = 'flex';
        canvas.style.display = 'none';

        fetch('/portfolio/history/total?tab=stocks&range=' + range)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                loading.style.display = 'none';
                canvas.style.display = 'block';
                var existing = Chart.getChart('stockTotalChart');
                if (existing) existing.destroy();
                new Chart(canvas, {
                    type: 'line',
                    data: {
                        datasets: [{
                            data: mapPoints(data),
                            borderColor: 'rgba(99, 102, 241, 1)',
                            backgroundColor: 'rgba(99, 102, 241, 0.1)',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0,
                            borderWidth: 2
                        }]
                    },
                    options: historyLineOpts
                });
            })
            .catch(function() {
                loading.style.display = 'none';
                canvas.style.display = 'block';
            });
    };

    // Load default (1y)
    loadStockTotalHistory('1y');

    // --- EUR/USD exchange rate history ---
    var eurusdLineOpts = {
        responsive: true,
        interaction: { mode: 'nearest', axis: 'x', intersect: false },
        plugins: {
            legend: { display: false },
            tooltip: {
                callbacks: {
                    title: function(items) {
                        if (!items.length) return '';
                        return new Date(items[0].parsed.x).toLocaleDateString('fr-FR', {day:'numeric', month:'short', year:'numeric'});
                    },
                    label: function(item) {
                        return '1 EUR = ' + item.parsed.y.toLocaleString('fr-FR', {minimumFractionDigits:4, maximumFractionDigits:4}) + ' USD';
                    }
                }
            }
        },
        scales: {
            x: {
                type: 'time',
                time: { tooltipFormat: 'dd MMM yyyy' },
                ticks: { maxTicksLimit: 8 }
            },
            y: {
                ticks: {
                    callback: function(value) { return value.toLocaleString('fr-FR', {minimumFractionDigits:4, maximumFractionDigits:4}); }
                }
            }
        }
    };

    window.loadEURUSDHistory = function(range) {
        setActiveBtn('eurusd-range-btns', rangeIndex[range]);
        var loading = document.getElementById('eurusd-loading');
        var canvas = document.getElementById('eurusdChart');
        loading.style.display = 'flex';
        canvas.style.display = 'none';

        fetch('/portfolio/history/eurusd?range=' + range)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                loading.style.display = 'none';
                canvas.style.display = 'block';
                var existing = Chart.getChart('eurusdChart');
                if (existing) existing.destroy();
                new Chart(canvas, {
                    type: 'line',
                    data: {
                        datasets: [{
                            data: mapPoints(data),
                            borderColor: 'rgba(34, 197, 94, 1)',
                            backgroundColor: 'rgba(34, 197, 94, 0.1)',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0,
                            borderWidth: 2
                        }]
                    },
                    options: eurusdLineOpts
                });
            })
            .catch(function() {
                loading.style.display = 'none';
                canvas.style.display = 'block';
            });
    };

    loadEURUSDHistory('1y');

    // --- Per-asset stock history ---
    var currentStockISIN = '';
    window.showStockHistory = function(isin, name) {
        currentStockISIN = isin;
        document.getElementById('stock-asset-history').style.display = 'block';
        document.getElementById('stock-asset-title').textContent = name + ' - Historique';
        loadStockAssetHistory('1y');
        document.getElementById('stock-asset-history').scrollIntoView({behavior: 'smooth', block: 'nearest'});
    };

    window.loadStockAssetHistory = function(range) {
        if (!currentStockISIN) return;
        setActiveBtn('stock-asset-range-btns', rangeIndex[range]);
        var loading = document.getElementById('stock-asset-loading');
        var canvas = document.getElementById('stockAssetChart');
        loading.style.display = 'flex';
        canvas.style.display = 'none';

        fetch('/portfolio/history?isin=' + encodeURIComponent(currentStockISIN) + '&range=' + range)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                loading.style.display = 'none';
                canvas.style.display = 'block';
                var existing = Chart.getChart('stockAssetChart');
                if (existing) existing.destroy();
                new Chart(canvas, {
                    type: 'line',
                    data: {
                        datasets: [{
                            data: mapPoints(data),
                            borderColor: 'rgba(99, 102, 241, 1)',
                            backgroundColor: 'rgba(99, 102, 241, 0.1)',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0,
                            borderWidth: 2
                        }]
                    },
                    options: historyLineOpts
                });
            })
            .catch(function() {
                loading.style.display = 'none';
                canvas.style.display = 'block';
            });
    };
})();
</script>
{{end}}
