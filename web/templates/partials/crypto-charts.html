{{define "crypto-charts.html"}}
{{if gt (len .Positions) 0}}
<div class="bg-white shadow rounded-lg p-6 mt-6">
    <h2 class="text-xl font-bold text-gray-900 mb-4">R&eacute;partition</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Allocation by wallet -->
        <div>
            <h3 class="text-sm font-semibold text-gray-600 text-center mb-2">Par wallet</h3>
            <canvas id="walletChart" height="250"></canvas>
        </div>

        <!-- Allocation by crypto -->
        <div>
            <h3 class="text-sm font-semibold text-gray-600 text-center mb-2">Par crypto</h3>
            <canvas id="cryptoChart" height="250"></canvas>
        </div>

        <!-- Gain/loss per position -->
        <div>
            <h3 class="text-sm font-semibold text-gray-600 text-center mb-2">Plus/moins-value</h3>
            <canvas id="cryptoGainChart" height="250"></canvas>
        </div>
    </div>
</div>

<!-- Total crypto portfolio value history -->
<div class="bg-white shadow rounded-lg p-6 mt-6">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-gray-900">Evolution de la valeur</h2>
        <div class="flex gap-1" id="crypto-total-range-btns">
            <button onclick="loadCryptoTotalHistory('1m')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-purple-50 hover:text-purple-700 hover:border-purple-300 transition-colors">1M</button>
            <button onclick="loadCryptoTotalHistory('3m')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-purple-50 hover:text-purple-700 hover:border-purple-300 transition-colors">3M</button>
            <button onclick="loadCryptoTotalHistory('1y')" class="px-3 py-1 text-xs font-medium rounded-full bg-purple-100 text-purple-700 border border-purple-300 transition-colors">1A</button>
            <button onclick="loadCryptoTotalHistory('5y')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-purple-50 hover:text-purple-700 hover:border-purple-300 transition-colors">5A</button>
            <button onclick="loadCryptoTotalHistory('max')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-purple-50 hover:text-purple-700 hover:border-purple-300 transition-colors">Max</button>
        </div>
    </div>
    <div id="crypto-total-loading" class="flex items-center justify-center py-8 text-gray-400">
        <svg class="animate-spin h-5 w-5 mr-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        Chargement...
    </div>
    <div id="crypto-total-empty" class="flex items-center justify-center py-8 text-gray-400" style="display:none;">
        <span>Aucune donn&eacute;e disponible pour cette p&eacute;riode</span>
    </div>
    <canvas id="cryptoTotalChart" height="100" style="display:none;"></canvas>
</div>

<!-- Per-asset crypto history chart -->
<div id="crypto-asset-history" class="bg-white shadow rounded-lg p-6 mt-6" style="display:none;">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-gray-900" id="crypto-asset-title">Historique</h2>
        <div class="flex items-center gap-2">
            <div class="flex gap-1" id="crypto-asset-range-btns">
                <button onclick="loadCryptoAssetHistory('1m')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-purple-50 hover:text-purple-700 hover:border-purple-300 transition-colors">1M</button>
                <button onclick="loadCryptoAssetHistory('3m')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-purple-50 hover:text-purple-700 hover:border-purple-300 transition-colors">3M</button>
                <button onclick="loadCryptoAssetHistory('1y')" class="px-3 py-1 text-xs font-medium rounded-full bg-purple-100 text-purple-700 border border-purple-300 transition-colors">1A</button>
                <button onclick="loadCryptoAssetHistory('5y')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-purple-50 hover:text-purple-700 hover:border-purple-300 transition-colors">5A</button>
                <button onclick="loadCryptoAssetHistory('max')" class="px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-purple-50 hover:text-purple-700 hover:border-purple-300 transition-colors">Max</button>
            </div>
            <button onclick="document.getElementById('crypto-asset-history').style.display='none'" class="text-gray-400 hover:text-gray-600 text-lg leading-none">&times;</button>
        </div>
    </div>
    <div id="crypto-asset-loading" class="flex items-center justify-center py-8 text-gray-400" style="display:none;">
        <svg class="animate-spin h-5 w-5 mr-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        Chargement...
    </div>
    <div id="crypto-asset-empty" class="flex items-center justify-center py-8 text-gray-400" style="display:none;">
        <span>Aucune donn&eacute;e disponible pour cette p&eacute;riode</span>
    </div>
    <canvas id="cryptoAssetChart" height="100"></canvas>
</div>

<script>
(function() {
    // Destroy existing charts if they exist
    ['walletChart', 'cryptoChart', 'cryptoGainChart'].forEach(function(id) {
        var existing = Chart.getChart(id);
        if (existing) existing.destroy();
    });

    var walletLabels = {{toJSON .WalletLabels}};
    var walletValues = {{toJSON .WalletValues}};
    var cryptoLabels = {{toJSON .CryptoLabels}};
    var cryptoValues = {{toJSON .CryptoValues}};
    var gainLabels = {{toJSON .GainLabels}};
    var gainValues = {{toJSON .GainValues}};
    var gainColors = {{toJSON .GainColors}};

    var pieColors = [
        'rgba(234, 179, 8, 0.7)',   // yellow - binance
        'rgba(59, 130, 246, 0.7)',  // blue - coinbase
        'rgba(99, 102, 241, 0.7)',  // indigo - crypto.com
        'rgba(34, 197, 94, 0.7)',   // green - swissborg
        'rgba(239, 68, 68, 0.7)',
        'rgba(14, 165, 233, 0.7)',
        'rgba(236, 72, 153, 0.7)',
        'rgba(168, 85, 247, 0.7)'
    ];

    var cryptoColors = [
        'rgba(247, 147, 26, 0.7)',  // bitcoin orange
        'rgba(98, 126, 234, 0.7)',  // ethereum blue
        'rgba(0, 255, 163, 0.7)',   // solana green
        'rgba(230, 0, 122, 0.7)',   // polkadot pink
        'rgba(99, 102, 241, 0.7)',
        'rgba(249, 115, 22, 0.7)',
        'rgba(34, 197, 94, 0.7)',
        'rgba(239, 68, 68, 0.7)'
    ];

    new Chart(document.getElementById('walletChart'), {
        type: 'pie',
        data: {
            labels: walletLabels,
            datasets: [{
                data: walletValues,
                backgroundColor: pieColors.slice(0, walletLabels.length)
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });

    new Chart(document.getElementById('cryptoChart'), {
        type: 'pie',
        data: {
            labels: cryptoLabels,
            datasets: [{
                data: cryptoValues,
                backgroundColor: cryptoColors.slice(0, cryptoLabels.length)
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });

    new Chart(document.getElementById('cryptoGainChart'), {
        type: 'bar',
        data: {
            labels: gainLabels,
            datasets: [{
                label: 'Plus/moins-value (\u20ac)',
                data: gainValues,
                backgroundColor: gainColors
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(value) { return value.toLocaleString('fr-FR') + ' \u20ac'; }
                    }
                }
            }
        }
    });

    // --- History chart helpers ---
    function mapPoints(data) {
        if (!Array.isArray(data)) return [];
        return data.filter(function(pt) { return pt && pt.t != null && pt.p != null; })
                   .map(function(pt) { return {x: pt.t, y: pt.p}; });
    }

    var historyLineOpts = {
        responsive: true,
        interaction: { mode: 'nearest', axis: 'x', intersect: false },
        plugins: {
            legend: { display: false },
            tooltip: {
                callbacks: {
                    title: function(items) {
                        if (!items.length) return '';
                        return new Date(items[0].parsed.x).toLocaleDateString('fr-FR', {day:'numeric', month:'short', year:'numeric'});
                    },
                    label: function(item) {
                        return item.parsed.y.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' \u20ac';
                    }
                }
            }
        },
        scales: {
            x: {
                type: 'time',
                time: { tooltipFormat: 'dd MMM yyyy' },
                ticks: { maxTicksLimit: 8 }
            },
            y: {
                ticks: {
                    callback: function(value) { return value.toLocaleString('fr-FR') + ' \u20ac'; }
                }
            }
        }
    };

    function setActiveBtn(containerId, activeIdx) {
        var btns = document.getElementById(containerId).querySelectorAll('button');
        btns.forEach(function(btn, i) {
            if (i === activeIdx) {
                btn.className = 'px-3 py-1 text-xs font-medium rounded-full bg-purple-100 text-purple-700 border border-purple-300 transition-colors';
            } else {
                btn.className = 'px-3 py-1 text-xs font-medium rounded-full border border-gray-300 text-gray-600 hover:bg-purple-50 hover:text-purple-700 hover:border-purple-300 transition-colors';
            }
        });
    }

    var rangeIndex = {'1m':0, '3m':1, '1y':2, '5y':3, 'max':4};

    // --- Total crypto portfolio history ---
    window.loadCryptoTotalHistory = function(range) {
        setActiveBtn('crypto-total-range-btns', rangeIndex[range]);
        var loading = document.getElementById('crypto-total-loading');
        var empty = document.getElementById('crypto-total-empty');
        var canvas = document.getElementById('cryptoTotalChart');
        loading.style.display = 'flex';
        empty.style.display = 'none';
        canvas.style.display = 'none';

        fetch('/portfolio/history/total?tab=crypto&range=' + range)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                loading.style.display = 'none';
                var points = mapPoints(data);
                if (points.length === 0) {
                    empty.style.display = 'flex';
                    canvas.style.display = 'none';
                    var existing = Chart.getChart('cryptoTotalChart');
                    if (existing) existing.destroy();
                    return;
                }
                empty.style.display = 'none';
                canvas.style.display = 'block';
                var existing = Chart.getChart('cryptoTotalChart');
                if (existing) existing.destroy();
                new Chart(canvas, {
                    type: 'line',
                    data: {
                        datasets: [{
                            data: points,
                            borderColor: 'rgba(168, 85, 247, 1)',
                            backgroundColor: 'rgba(168, 85, 247, 0.1)',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0,
                            borderWidth: 2
                        }]
                    },
                    options: historyLineOpts
                });
            })
            .catch(function() {
                loading.style.display = 'none';
                empty.style.display = 'flex';
                canvas.style.display = 'none';
            });
    };

    // Load default (1y)
    loadCryptoTotalHistory('1y');

    // --- Per-asset crypto history ---
    var currentCryptoID = '';
    window.showCryptoHistory = function(coingeckoId, name) {
        currentCryptoID = coingeckoId;
        document.getElementById('crypto-asset-history').style.display = 'block';
        document.getElementById('crypto-asset-title').textContent = name + ' - Historique';
        loadCryptoAssetHistory('1y');
        document.getElementById('crypto-asset-history').scrollIntoView({behavior: 'smooth', block: 'nearest'});
    };

    window.loadCryptoAssetHistory = function(range) {
        if (!currentCryptoID) return;
        setActiveBtn('crypto-asset-range-btns', rangeIndex[range]);
        var loading = document.getElementById('crypto-asset-loading');
        var empty = document.getElementById('crypto-asset-empty');
        var canvas = document.getElementById('cryptoAssetChart');
        loading.style.display = 'flex';
        empty.style.display = 'none';
        canvas.style.display = 'none';

        fetch('/portfolio/crypto/history?id=' + encodeURIComponent(currentCryptoID) + '&range=' + range)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                loading.style.display = 'none';
                var points = mapPoints(data);
                if (points.length === 0) {
                    empty.style.display = 'flex';
                    canvas.style.display = 'none';
                    var existing = Chart.getChart('cryptoAssetChart');
                    if (existing) existing.destroy();
                    return;
                }
                empty.style.display = 'none';
                canvas.style.display = 'block';
                var existing = Chart.getChart('cryptoAssetChart');
                if (existing) existing.destroy();
                new Chart(canvas, {
                    type: 'line',
                    data: {
                        datasets: [{
                            data: points,
                            borderColor: 'rgba(168, 85, 247, 1)',
                            backgroundColor: 'rgba(168, 85, 247, 0.1)',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0,
                            borderWidth: 2
                        }]
                    },
                    options: historyLineOpts
                });
            })
            .catch(function() {
                loading.style.display = 'none';
                empty.style.display = 'flex';
                canvas.style.display = 'none';
            });
    };
})();
</script>
{{end}}
{{end}}
