{{define "layout"}}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoStock - Simulateur de Crédit Immobilier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
        .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold text-indigo-600">GoStock</a>
                </div>
                <div class="flex space-x-4">
                    <a href="/credit" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Simulateur Cr&eacute;dit</a>
                    <a href="/credit/compare" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Comparateur</a>
                    <a href="/portfolio" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Patrimoine</a>
                    <a href="/dashboard" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Tableau de bord</a>
                    <a href="/budget" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Budget</a>
                    <a href="/tax" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Imp&ocirc;ts</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        {{template "content" .}}
    </main>
</body>
</html>
{{end}}
